<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MLB Slam Or Slump Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #181a1b;
            color: white;
        }

        h1 {
            color: white;
        }

        .controls {
            margin-bottom: 20px;
        }

        label {
            margin-right: 6px;
        }

        select,
        input,
        button {
            padding: 6px;
            margin-right: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #222;
        }

        th,
        td {
            padding: 9px;
            text-align: center;
            border: 1px solid #555;
        }

        th {
            background: #2f6fa3;
            color: white;
            cursor: pointer;
            position: sticky;
            top: 0;
        }

        tr:nth-child(even) {
            background: #2a2a2a;
        }

        tr:nth-child(odd) {
            background: #202020;
        }

        .muted {
            color: #bbb;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>MLB Slam Or Slump Dashboard</h1>

    <div class="controls">
        <label for="team">Team:</label>
        <select id="team">
            <option value="">All Teams</option>
            {% for team in team_names %}
                <option value="{{ team }}">{{ team }}</option>
            {% endfor %}
        </select>

        <label for="search">Player:</label>
        <input id="search" type="text" placeholder="Search player name">

        <button id="applyBtn" type="button">Apply</button>

        <span class="muted" id="statusText">Loading...</span>
    </div>

    <table>
        <thead>
            <tr>
                <th data-sort="name">Player</th>
                <th data-sort="team">Team</th>
                <th data-sort="l5">L5 AVG</th>
                <th data-sort="l10">L10 AVG</th>
                <th data-sort="season">Total AVG</th>
                <th data-sort="ab">AB</th>
            </tr>
        </thead>
        <tbody id="playerRows"></tbody>
    </table>

    <script>
        let currentSort = "name";
        let currentDir = "asc";

        function shade(diff) {
            const val = Math.min(Math.abs(diff) * 1000, 180);

            if (diff > 0) {
                return `rgb(255, ${255 - val}, ${255 - val})`;
            }

            if (diff < 0) {
                return `rgb(${255 - val}, ${255 - val}, 255)`;
            }

            return "transparent";
        }

        function loadPlayers() {
            const team = document.getElementById("team").value;
            const search = document.getElementById("search").value;
            const statusText = document.getElementById("statusText");

            statusText.textContent = "Loading...";

            const params = new URLSearchParams({
                team,
                search,
                sort: currentSort,
                dir: currentDir
            });

            fetch(`/api/players?${params.toString()}`)
                .then(response => response.json())
                .then(players => {
                    const tbody = document.getElementById("playerRows");
                    tbody.innerHTML = "";

                    players.forEach(player => {
                        const row = document.createElement("tr");

                        row.innerHTML = `
                            <td>${player.name}</td>
                            <td>${player.team}</td>
                            <td style="background:${shade(player.diff_l5)}; color:#111;">${player.l5}</td>
                            <td style="background:${shade(player.diff_l10)}; color:#111;">${player.l10}</td>
                            <td>${player.season}</td>
                            <td>${player.ab}</td>
                        `;

                        tbody.appendChild(row);
                    });

                    statusText.textContent = `${players.length} players shown`;
                })
                .catch(error => {
                    console.error(error);
                    statusText.textContent = "Error loading players";
                });
        }

        document.getElementById("applyBtn").addEventListener("click", loadPlayers);

        document.getElementById("search").addEventListener("keydown", event => {
            if (event.key === "Enter") {
                loadPlayers();
            }
        });

        document.querySelectorAll("th[data-sort]").forEach(header => {
            header.addEventListener("click", () => {
                const sort = header.dataset.sort;

                if (currentSort === sort) {
                    currentDir = currentDir === "asc" ? "desc" : "asc";
                } else {
                    currentSort = sort;
                    currentDir = "asc";
                }

                loadPlayers();
            });
        });

        loadPlayers();
    </script>
</body>
</html>
